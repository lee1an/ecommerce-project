<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | Ilivate</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
  <h1 onclick="window.location.href='index.html'">Ilivate</h1>
  <div class="nav-actions">
    <button class="btn btn-ghost" onclick="goToCart()" id="cart-btn">
      <i class="fas fa-shopping-cart"></i>
      <span>Cart</span>
      <span id="cart-badge">0</span>
    </button>
    <button class="btn btn-ghost" onclick="goBack()">
      <i class="fas fa-arrow-left"></i>
      <span>Back</span>
    </button>
  </div>
</header>

<section class="container" style="padding-top: 3rem;">
  <h2 style="text-align: left; margin-bottom: 2rem;">Shopping Cart</h2>

  <div id="cart-items" class="products">
    <!-- Cart items will be injected here -->
  </div>

  <div class="cart-summary">
    <h2>Order Summary</h2>
    
    <div class="summary-row">
      <span class="text-muted">Subtotal</span>
      <span id="subtotal">₱0</span>
    </div>
    
    <div class="summary-row">
      <span class="text-muted">Shipping Fee</span>
      <span id="shipping">₱100</span>
    </div>
    
    <div class="summary-row total">
      <span>Total</span>
      <span id="total">₱0</span>
    </div>

    <button class="btn btn-primary checkout-btn" onclick="checkout()" style="width: 100%; padding: 1rem; margin-top: 1rem;">
      <i class="fas fa-lock"></i> Secure Checkout
    </button>
    
    <button class="btn btn-ghost" onclick="clearCart()" style="width: 100%; margin-top: 0.5rem; color: var(--danger);">
      <i class="fas fa-trash-sweep"></i> Clear Cart
    </button>

    <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 1.5rem; text-align: center;">
      <i class="fas fa-shield-alt"></i> Secure payment processing
    </p>
  </div>
</section>

<script src="cart.js"></script>
</body>
</html>
